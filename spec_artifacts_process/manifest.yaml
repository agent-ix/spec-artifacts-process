manifest_version: 1.0.0
name: spec-artifacts-process
version: 0.1.0
description: "Filament Module: process artifact templates (ADR, Plan, Task, Review, Finding, TestMatrix, Standard) \u2014 Jinja .md.j2 templates"
archetypes:
- kind: adr
  name: ADR
  doc_backed: true
  supports_membership: false
  composition:
    states:
    - proposed
    - accepted
    - superseded
    - rejected
- kind: plan
  name: Plan
  doc_backed: true
  supports_membership: true
  composition:
    expected_artifacts:
    - Task
- kind: review
  name: Review
  doc_backed: true
  supports_membership: true
  composition:
    expected_artifacts:
    - Finding
    nav:
      top_level: true
      order: 12
- kind: test-matrix
  name: Test Matrix
  doc_backed: true
  supports_membership: false
- kind: standard
  name: Standard
  doc_backed: true
  supports_membership: false
grammars:
- name: process-artifacts
  version: 0.1.0
  description: Process artifacts grammar (ADR, plan, review, etc.)
  doc_kinds:
  - adr
  - plan
  - review
  - test-matrix
  - standard
  - finding
artifact_types:
- name: ADR
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/adr-frontmatter.schema.json
  defaults:
    id_pattern: ADR-{next:03d}
  allowed_links:
  - supersedes
  - superseded_by
  - relates_to
  - depends_on
  examples: []
  lint_rules_ref: []
- name: Plan
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/plan-frontmatter.schema.json
  defaults:
    id_pattern: Plan-{next:03d}
  allowed_links:
  - contains
  - depends_on
  - references
  examples: []
  lint_rules_ref: []
- name: Task
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/task-frontmatter.schema.json
  defaults:
    id_pattern: Task-{next:03d}
  allowed_links:
  - depends_on
  - verifies
  - references
  examples: []
  lint_rules_ref: []
- name: Review
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/review-frontmatter.schema.json
  defaults:
    id_pattern: Review-{next:03d}
  allowed_links:
  - reviews
  - references
  examples: []
  lint_rules_ref: []
- name: Finding
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/finding-frontmatter.schema.json
  defaults:
    id_pattern: Finding-{next:03d}
  allowed_links:
  - found_in
  - blocks
  - references
  examples: []
  lint_rules_ref: []
- name: TestMatrix
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/testmatrix-frontmatter.schema.json
  defaults:
    id_pattern: TestMatrix-{next:03d}
  allowed_links:
  - covers
  - references
  examples: []
  lint_rules_ref: []
- name: Standard
  grammar_ref: process-artifacts
  frontmatter_schema_ref: schemas/standard-frontmatter.schema.json
  defaults:
    id_pattern: Standard-{next:03d}
  allowed_links:
  - references
  examples: []
  lint_rules_ref: []
doc_kinds:
- adr
- plan
- review
- test-matrix
- standard
- finding
object_types:
- name: standard
  data_schema:
    type: object
    properties:
      code:
        type: string
      name:
        type: string
      description:
        type: string
      guide:
        type: string
      link:
        type: string
    required:
    - code
  body_extraction:
    yield_pattern:
      match:
        id:
          from: frontmatter_field
          path:
          - id
          required: false
        title:
          from: frontmatter_field
          path:
          - title
          required: false
        artifact_type:
          from: frontmatter_field
          path:
          - artifact_type
          required: false
        code:
          from: frontmatter_field
          path:
          - code
          required: true
        name:
          from: frontmatter_field
          path:
          - name
          required: false
        link:
          from: frontmatter_field
          path:
          - link
          required: false
        description:
          from: section_body
          after_heading: Description
          required: false
        guide:
          from: section_body
          after_heading: Application Guidance
          required: false
  allowed_links:
    references: []
lint_rules: []
